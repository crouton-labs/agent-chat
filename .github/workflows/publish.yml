name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish-core:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # wire-contract.test.ts is a drift guard (spec §18) that reads crtr's
      # own protocol/reducer source at test time. It expects crouter checked
      # out as a sibling of this repo, mirroring the local ~/Code/cli layout.
      # actions/checkout refuses paths outside the workspace, so clone directly.
      # working-directory: . (repo root, not packages/core) so ../crouter lands
      # as a true sibling of the repo, not inside the packages/* workspace glob.
      - run: git clone --depth 1 https://github.com/crouton-labs/crouter.git ../crouter
        working-directory: .

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - run: pnpm --filter @crouton-kit/agent-chat-core test
        working-directory: .

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # npm's git integration only auto-commits/tags when `.git` is a
          # direct child of cwd (@npmcli/git's `is()` doesn't walk up), which
          # is never true from packages/core in this monorepo layout, so it
          # silently bumps package.json without committing. Do the git side
          # ourselves instead of relying on that.
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: release core v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push --follow-tags

      - run: pnpm build

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
